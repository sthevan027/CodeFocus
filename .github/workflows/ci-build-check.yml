name: "CI - Build & Lint Check"

on:
  push:
    branches: [main, develop]
    paths:
      - "app/**"
      - ".github/workflows/ci-build-check.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    outputs:
      status: ${{ steps.lint.outcome }}
      errors: ${{ steps.lint.outputs.errors }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar ESLint
        id: lint
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(pnpm run lint 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "errors<<$EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

  test:
    name: Test Check
    runs-on: ubuntu-latest
    needs: [lint]
    if: always()
    defaults:
      run:
        working-directory: app
    outputs:
      status: ${{ steps.test.outcome }}
      errors: ${{ steps.test.outputs.errors }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar testes
        id: test
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(pnpm run test:ci 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "errors<<$EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    defaults:
      run:
        working-directory: app
    outputs:
      status: ${{ steps.build.outcome }}
      errors: ${{ steps.build.outputs.errors }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Build do projeto
        id: build
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(pnpm run build 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "errors<<$EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

  report-issues:
    name: Reportar Problemas
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always() && (needs.lint.outputs.status == 'failure' || needs.test.outputs.status == 'failure' || needs.build.outputs.status == 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Gerar relatório de erros
        id: report
        env:
          LINT_STATUS: ${{ needs.lint.outputs.status }}
          BUILD_STATUS: ${{ needs.build.outputs.status }}
          TEST_STATUS: ${{ needs.test.outputs.status }}
          LINT_ERRORS: ${{ needs.lint.outputs.errors }}
          BUILD_ERRORS: ${{ needs.build.outputs.errors }}
          TEST_ERRORS: ${{ needs.test.outputs.errors }}
        run: |
          DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            printf '## 🐛 CI - Erros Detectados\n\n'
            printf '**Branch:** `%s`\n' '${{ github.ref_name }}'
            printf '**Commit:** `%s`\n' '${{ github.sha }}'
            printf '**Autor:** @%s\n' '${{ github.actor }}'
            printf '**Workflow:** [Ver execução](%s/%s/actions/runs/%s)\n\n' '${{ github.server_url }}' '${{ github.repository }}' '${{ github.run_id }}'
            printf -- '---\n\n'

            if [ "$LINT_STATUS" = "failure" ]; then
              printf '### ESLint - Problemas de Código\n\n```\n%s\n```\n\n' "$LINT_ERRORS"
            else
              printf '### ESLint - OK\n\n'
            fi

            if [ "$TEST_STATUS" = "failure" ]; then
              printf '### Testes - Falha\n\n```\n%s\n```\n\n' "$TEST_ERRORS"
            else
              printf '### Testes - OK\n\n'
            fi

            if [ "$BUILD_STATUS" = "failure" ]; then
              printf '### Build - Falha na Compilação\n\n```\n%s\n```\n\n' "$BUILD_ERRORS"
            else
              printf '### Build - OK\n\n'
            fi

            printf -- '---\n**Ação necessária:** Corrigir os erros acima antes de fazer merge.\n'
          } > body.txt

          echo "body<<$DELIM" >> $GITHUB_OUTPUT
          cat body.txt >> $GITHUB_OUTPUT
          echo "$DELIM" >> $GITHUB_OUTPUT

      - name: Criar Issue de Bug
        if: github.event_name == 'push'
        env:
          REPORT_BODY: ${{ toJSON(steps.report.outputs.body) }}
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const body = (() => { try { return JSON.parse(process.env.REPORT_BODY || '""'); } catch (_) { return process.env.REPORT_BODY || 'Erro ao gerar relatório.'; } })();
              const refName = '${{ github.ref_name }}';
              const maxBodyLength = 60000;

              const truncatedBody = body.length > maxBodyLength
                ? body.substring(0, maxBodyLength) + '\n\n... (conteúdo truncado)'
                : body;

              const existingIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });

              const branchIssue = existingIssues.data.find(
                i => i.title.includes(refName)
              );

              const title = `🐛 CI Falhou - Branch: ${refName} (${new Date().toISOString().split('T')[0]})`;

              const issueParams = { owner: context.repo.owner, repo: context.repo.repo };
              const labels = [];
              for (const labelName of ['ci-automated', 'bug']) {
                try {
                  await github.rest.issues.getLabel({ ...issueParams, name: labelName });
                  labels.push(labelName);
                } catch (_) {}
              }

              if (branchIssue) {
                await github.rest.issues.update({
                  ...issueParams,
                  issue_number: branchIssue.number,
                  body: truncatedBody
                });
                console.log(`Issue #${branchIssue.number} atualizada`);
              } else {
                const issue = await github.rest.issues.create({
                  ...issueParams,
                  title,
                  body: truncatedBody,
                  labels
                });
                console.log(`Issue #${issue.data.number} criada`);
              }
            } catch (error) {
              console.error('Erro ao criar/atualizar issue:', error.message);
              throw error;
            }

      - name: Comentar no PR
        if: github.event_name == 'pull_request'
        env:
          REPORT_BODY: ${{ toJSON(steps.report.outputs.body) }}
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const body = (() => { try { return JSON.parse(process.env.REPORT_BODY || '""'); } catch (_) { return process.env.REPORT_BODY || 'Erro ao gerar relatório.'; } })();
              const maxBodyLength = 60000;
              const truncatedBody = body.length > maxBodyLength
                ? body.substring(0, maxBodyLength) + '\n\n... (conteúdo truncado)'
                : body;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: truncatedBody
              });
              console.log('Comentário adicionado ao PR');
            } catch (error) {
              console.error('Erro ao comentar no PR:', error.message);
              throw error;
            }

  ci-success:
    name: CI Aprovado
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always() && needs.lint.outputs.status == 'success' && needs.test.outputs.status == 'success' && needs.build.outputs.status == 'success'
    steps:
      - name: Fechar issues automáticas antigas
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,ci-automated'
            });

            const refName = '${{ github.ref_name }}';
            for (const issue of issues.data) {
              if (issue.title.includes(refName)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ **CI passou com sucesso!** Erros foram corrigidos no commit `${{ github.sha }}`.'
                });
                console.log(`Issue #${issue.number} fechada automaticamente`);
              }
            }

      - name: Status final
        run: echo "✅ Todos os checks passaram com sucesso!"
