version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15
    container_name: codefocus_postgres
    environment:
      POSTGRES_DB: codefocus_db
      POSTGRES_USER: codefocus_user
      POSTGRES_PASSWORD: codefocus_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codefocus_network

  # Backend FastAPI
  backend:
    build: .
    container_name: codefocus_backend
    environment:
      DATABASE_URL: postgresql://codefocus_user:codefocus_password@postgres:5432/codefocus_db
      SECRET_KEY: your-secret-key-here-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./reports:/app/reports
    networks:
      - codefocus_network
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:

networks:
  codefocus_network:
    driver: bridge 