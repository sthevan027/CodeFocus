<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste CodeFocus</title>
    <style>
        body {
            background: linear-gradient(135deg, #1f2937 0%, #1e40af 50%, #1f2937 100%);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CodeFocus</h1>
        <p>Teste de funcionamento do servidor</p>
        <p>Se você vê esta página, o servidor está funcionando!</p>
        <p>Data: <span id="date"></span></p>
    </div>
    
    <script>
        document.getElementById('date').textContent = new Date().toLocaleString('pt-BR');
    </script>
</body>
</html>
